# Tiny Tapeout project information
project:
  # The project name shown on the Tiny Tapeout website.
  title: "TinyMind AI Accelerator"

  # Your name.
  author: "Sishi"

  # Optional Discord username.
  discord: "Sishi888"

  # A one-line summary of the project.
  description: "An 8-input, 3-class fixed-weight ternary neural-network inference accelerator with class and confidence display views."

  # Hardware description language used by the project.
  language: "Verilog"

  # The design uses the manual step clock rather than a required fixed frequency.
  clock_hz: 0

  # The design occupies one Tiny Tapeout tile.
  tiles: "1x1"

  # This must exactly match the top-level module name in src/project.v.
  top_module: "tt_um_sishi888_tinymind"

  # Verilog source files located in the src folder.
  source_files:
    - "project.v"

# Pin descriptions shown on the Tiny Tapeout project page.
pinout:
  # Dedicated inputs
  ui[0]: "Feature 0: likes mathematics"
  ui[1]: "Feature 1: likes programming"
  ui[2]: "Feature 2: likes electronics"
  ui[3]: "Feature 3: likes physics"
  ui[4]: "Feature 4: likes data and patterns"
  ui[5]: "Feature 5: likes building things"
  ui[6]: "Feature 6: likes design and creativity"
  ui[7]: "Feature 7: likes experimentation and research"

  # Dedicated outputs
  uo[0]: "Seven-segment output bit 0"
  uo[1]: "Seven-segment output bit 1"
  uo[2]: "Seven-segment output bit 2"
  uo[3]: "Seven-segment output bit 3"
  uo[4]: "Seven-segment output bit 4"
  uo[5]: "Seven-segment output bit 5"
  uo[6]: "Seven-segment output bit 6"
  uo[7]: "Seven-segment decimal point"

  # Bidirectional pins
  uio[0]: "Unused"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

# Do not change this value.
yaml_version: 6

