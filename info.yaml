# Tiny Tapeout project information
project:
  title: "Schrodinger's Seven-Segment"
  author: "Sishi"
  discord: "Sishi888"
  description: "Interactive classical single-qubit simulator using a seven-segment display."
  language: "Verilog"

  # Use 0 because the project is demonstrated with the manual step clock.
  clock_hz: 0

  tiles: "1x1"
  top_module: "tt_um_example"

  source_files:
    - "project.v"

pinout:
  # Dedicated inputs
  ui[0]: "Test select bit 0"
  ui[1]: "Test select bit 1"
  ui[2]: "Test select bit 2"
  ui[3]: "Reserved"
  ui[4]: "Reserved"
  ui[5]: "Reserved"
  ui[6]: "Reserved"
  ui[7]: "Reserved"

  # Dedicated outputs
  uo[0]: "Seven-segment output bit 0"
  uo[1]: "Seven-segment output bit 1"
  uo[2]: "Seven-segment output bit 2"
  uo[3]: "Seven-segment output bit 3"
  uo[4]: "Seven-segment output bit 4"
  uo[5]: "Seven-segment output bit 5"
  uo[6]: "Seven-segment output bit 6"
  uo[7]: "Seven-segment output bit 7"

  # Bidirectional pins
  uio[0]: "Unused"
  uio[1]: "Unused"
  uio[2]: "Unused"
  uio[3]: "Unused"
  uio[4]: "Unused"
  uio[5]: "Unused"
  uio[6]: "Unused"
  uio[7]: "Unused"

yaml_version: 6
